- id: arima_gdp
  notes: 'ARIMA(1,1,1) on log US real GDP.

    Currently blocked: Hayashi uses Hannan-Rissanen estimation, while R/Python

    use MLE. The resulting AR and MA coefficients differ substantially, so the

    case cannot be validated against standard references until either the

    estimator method is configurable or a Hannan-Rissanen reference is added.

    '
  dimension: numerical
  status: blocked
