- id: did_kielmc
  notes: 'Difference-in-differences effect of incinerator proximity on log house prices.

    Currently blocked: Hayashi''s DiD output reports only the ATT and group means,

    not a full coefficient table. The orchestrator cannot parse the ATT scalar

    into the coefficient/standard-error structure used for comparison.

    '
  dimension: numerical
  status: pass
- id: ets_gdp
  notes: 'Exponential smoothing state-space model on US real GDP.

    Currently blocked: Hayashi''s `ets` prints the smoothing parameters

    (alpha, beta, gamma) as summary lines, not in a coefficient table with

    standard errors. The orchestrator cannot parse this output into the

    coefficient/standard-error structure used for comparison.

    '
  dimension: numerical
  status: blocked
