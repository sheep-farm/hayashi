id: logit-margins-mroz
title: Logit average marginal effects on Wooldridge mroz
estimator_family: logit
status: blocked
dimension: numerical

dataset:
  name: wooldridge::mroz
  source: R package wooldridge / Python wooldridge package
  licence: public teaching dataset

references:
  - R
  - Python

comparison:
  quantities:
    - marginal_effects
    - standard_errors
  tolerances:
    marginal_effects: 1e-4
    standard_errors: 1e-4

output_format: margins

hayashi_script: cases/logit_margins_mroz/hayashi/run.hay
reference_scripts:
  R: cases/logit_margins_mroz/reference/run.R
  Python: cases/logit_margins_mroz/reference/run.py

notes: "Blocked real-dataset validation case for logit average marginal effects on the Mroz dataset; Hayashi AMEs match R/statsmodels, but delta-method SEs differ pending issue #58."

result:
  summary: "Average marginal effects match, but Hayashi delta-method standard errors differ from R/statsmodels beyond tolerance."
  known_differences:
    - "Hayashi standard errors for several logit AMEs are larger than R/statsmodels delta-method SEs."
  issues_opened:
    - 58
