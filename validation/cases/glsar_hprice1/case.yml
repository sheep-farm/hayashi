id: glsar_hprice1
title: GLSAR(1) on Wooldridge hprice1
estimator_family: glsar
status: active
dimension: numerical

dataset:
  name: wooldridge::hprice1
  source: R package wooldridge / Python wooldridge package
  licence: public teaching dataset

references:
  - R
  - Python

comparison:
  quantities:
    - coefficients
    - standard_errors
  tolerances:
    coefficients: 1e-1
    standard_errors: 1e-1

output_format: txt

hayashi_script: cases/glsar_hprice1/hayashi/run.hay
reference_scripts:
  R: cases/glsar_hprice1/reference/run.R
  Python: cases/glsar_hprice1/reference/run.py

notes: R, Python, and Hayashi use the same iterative GLSAR(1) procedure and
  agree on coefficients and standard errors within tolerance.

result:
  summary: Hayashi GLSAR(1) estimates match the aligned R and Python references.
  known_differences: []
  issues_opened: []
