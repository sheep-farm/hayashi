id: ets-gdp
title: ETS on US real GDP
estimator_family: ets
status: blocked
dimension: numerical

dataset:
  name: statsmodels::macrodata
  source: statsmodels.datasets / Rdatasets
  licence: public teaching dataset

references:
  - R
  - Python

comparison:
  quantities:
    - coefficients
    - standard_errors
  tolerances:
    coefficients: 1e-2
    standard_errors: 1e-2

output_format: txt

hayashi_script: cases/ets_gdp/hayashi/run.hay
reference_scripts:
  R: cases/ets_gdp/reference/run.R
  Python: cases/ets_gdp/reference/run.py

notes: |
  Exponential smoothing state-space model on US real GDP.
  Greeners now exports a coefficient table, but the Hayashi `ets` implementation
  uses a grid-search over SSE while R/Python use MLE. Smoothing parameters differ
  beyond tolerance (e.g., gamma is near 1 in Hayashi and near 0 in MLE).

result:
  summary: "Blocked: Hayashi ETS uses SSE grid search, references use MLE"
  known_differences:
    - "Hayashi estimates gamma ~ 0.94 via SSE; R/Python ETSModel estimate gamma ~ 1e-8 via MLE"
  issues_opened: []
