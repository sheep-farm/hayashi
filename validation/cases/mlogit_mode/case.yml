id: mlogit_mode
title: Multinomial logit on travel mode choice data
estimator_family: mlogit
status: active
dimension: numerical

dataset:
  name: AER::TravelMode
  source: R package AER / Rdatasets (https://vincentarelbundock.github.io/Rdatasets/csv/AER/TravelMode.csv)
  licence: public teaching dataset

references:
  - R
  - Python

comparison:
  quantities:
    - coefficients
  tolerances:
    coefficients: 1e-1

output_format: txt

hayashi_script: cases/mlogit_mode/hayashi/run.hay
reference_scripts:
  R: cases/mlogit_mode/reference/run.R
  Python: cases/mlogit_mode/reference/run.py

notes: Multinomial logit of chosen travel mode (air=1, train=2, bus=3, car=4) on income, wait time, vehicle cost and travel time.

