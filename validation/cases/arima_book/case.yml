id: arima_book
title: ARIMA(1,1,0) on a simulated random walk
estimator_family: arima
status: active
dimension: numerical
dataset:
  name: simulated_rw
  source: generated by validation/cases/arima_book/data/gen.hay
  size: 500 observations
references:
- R
- Python
reference_scripts:
  R: cases/arima_book/reference/run.R
  Python: cases/arima_book/reference/run.py
hayashi_script: cases/arima_book/hayashi/run.hay
output_format: txt
comparison:
  quantities:
  - coefficients
  - standard_errors
  tolerances:
    coefficients: 1e-2
    standard_errors: 5e-2
notes: ARIMA(1,1,0) on a simulated random walk with seed 42. The intercept reported
  by Hayashi is excluded from comparison because the R/Python references are estimated
  without trend.
result:
  summary: ''
  known_differences: []
  issues_opened: []
