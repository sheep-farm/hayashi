id: kalman_nyse
title: Local-level Kalman filter on NYSE returns
estimator_family: kalman
status: active
dimension: numerical

dataset:
  name: wooldridge::nyse
  source: R package wooldridge / Python wooldridge package
  licence: public teaching dataset

references:
  - R

comparison:
  quantities:
    - sigma_obs
    - sigma_state
  tolerances:
    sigma_obs: 1e-2
    sigma_state: 1e-3

output_format: txt

hayashi_script: cases/kalman_nyse/hayashi/run.hay
reference_scripts:
  R: cases/kalman_nyse/reference/run.R

notes: Local-level Kalman filter on NYSE returns. Hayashi now estimates sigma_obs and sigma_state by maximum likelihood and returns a printable result object. sigma_state is very small and the likelihood is flat in that direction, so the absolute tolerance is set to 1e-3.

result:
  summary: "Hayashi matches the R dlm reference for local-level Kalman variances."
  known_differences: []
  issues_opened: []
