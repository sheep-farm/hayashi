id: psm_jtrain3
title: Propensity score matching on Wooldridge jtrain3
estimator_family: psm
status: active
dimension: numerical
dataset:
  name: wooldridge::jtrain3
  source: Python wooldridge package / R wooldridge package
  licence: public teaching dataset
references:
- R
- Python
comparison:
  quantities:
  - coefficients
  - standard_errors
  tolerances:
    coefficients: 1e-1
    standard_errors: 5e-1
output_format: txt
hayashi_script: cases/psm_jtrain3/hayashi/run.hay
reference_scripts:
  R: cases/psm_jtrain3/reference/run.R
  Python: cases/psm_jtrain3/reference/run.py
notes: R, Python, and Hayashi use the same absolute-caliper, no-replacement
  matching protocol; ATT agrees and bootstrap SEs are within tolerance.
result:
  summary: Hayashi PSM ATT and bootstrap SE match the aligned R and Python references.
  known_differences: []
  issues_opened: []
