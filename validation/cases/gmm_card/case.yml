id: gmm_card
title: GMM returns to schooling on Wooldridge card
estimator_family: gmm
status: active
dimension: numerical
dataset:
  name: wooldridge::card
  source: R package wooldridge / Python wooldridge package
  licence: public teaching dataset
references:
- R
- Python
comparison:
  quantities:
  - coefficients
  - standard_errors
  tolerances:
    coefficients: 1e-3
    standard_errors: 1e-3
output_format: txt
hayashi_script: cases/gmm_card/hayashi/run.hay
reference_scripts:
  R: cases/gmm_card/reference/run.R
  Python: cases/gmm_card/reference/run.py
notes: R and Python use robust two-step GMM references with matching covariance
  conventions; current Hayashi estimates match both within tolerance.
result:
  summary: Hayashi GMM estimates match the aligned R and Python references.
  known_differences: []
  issues_opened: []
