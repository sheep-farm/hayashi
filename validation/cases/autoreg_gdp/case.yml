id: autoreg_gdp
title: AR(1) on US real GDP with constant and trend
estimator_family: autoreg
status: active
dimension: numerical
dataset:
  name: statsmodels::macrodata
  source: statsmodels.datasets / Rdatasets
  licence: public teaching dataset
references:
- R
- Python
comparison:
  quantities:
  - coefficients
  - standard_errors
  tolerances:
    coefficients: 1e-2
    standard_errors: 2e-1
output_format: txt
hayashi_script: cases/autoreg_gdp/hayashi/run.hay
reference_scripts:
  R: cases/autoreg_gdp/reference/run.R
  Python: cases/autoreg_gdp/reference/run.py
notes: The R and Python references use the same conditional AR(1) design with a
  constant and linear trend; current Hayashi estimates match both within tolerance.
result:
  summary: Hayashi autoreg estimates match the corrected R and Python references.
  known_differences: []
  issues_opened: []
