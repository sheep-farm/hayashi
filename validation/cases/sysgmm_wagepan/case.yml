id: sysgmm_wagepan
title: System GMM (Blundell-Bond) on Wooldridge wagepan
estimator_family: sysgmm
status: active
dimension: numerical

dataset:
  name: wooldridge::wagepan
  source: R package wooldridge / Python wooldridge package
  licence: public teaching dataset

references:
  - Python

comparison:
  quantities:
    - coefficients
    - standard_errors
  tolerances:
    coefficients: 1e-3
    standard_errors: 1e-2

output_format: txt

hayashi_script: cases/sysgmm_wagepan/hayashi/run.hay
reference_scripts:
  Python: cases/sysgmm_wagepan/reference/run.py

notes: System GMM (Blundell-Bond) two-step on Wooldridge wagepan with lags=2. Python reference implements the same two-step System GMM procedure used by Hayashi/Greeners. R plm::pgmm with a similar formula differs because it uses all available lags and may apply a different weight matrix; the Python reference matches Hayashi exactly.

result:
  summary: "Hayashi matches the Python reference for System GMM coefficients and standard errors."
  known_differences: []
  issues_opened: []
