id: betareg_wooldridge_401k
title: Beta regression on 401k participation rates
estimator_family: betareg
status: active
dimension: numerical

dataset:
  name: wooldridge::401k
  source: R package wooldridge / Python wooldridge package
  licence: public teaching dataset

references:
  - R

comparison:
  quantities:
    - coefficients
    - standard_errors
  tolerances:
    coefficients: 1e-3
    standard_errors: 1e-2

output_format: txt

hayashi_script: cases/betareg_wooldridge_401k/hayashi/run.hay
reference_scripts:
  R: cases/betareg_wooldridge_401k/reference/run.R

notes: Beta regression on 401k participation rates. Greeners now estimates the model by BFGS with an analytic gradient and computes standard errors from the observed inverse Hessian, matching R betareg.

result:
  summary: "Hayashi matches R betareg coefficients and standard errors."
  known_differences: []
  issues_opened: []
