id: lpdid_pylpdid_quickstart
title: LP-DiD quickstart against pylpdid (absorbing staggered adoption)
estimator_family: did
status: active
dimension: numerical

dataset:
  name: simulated_absorbing_panel
  source: DGP from pylpdid/examples/01_quickstart.py
  licence: MIT (pylpdid)

references:
  - Python

reference_scripts:
  Python: cases/lpdid_pylpdid_quickstart/reference/run.py

hayashi_script: cases/lpdid_pylpdid_quickstart/hayashi/run.hay

output_format: csv

comparison:
  quantities:
    - coefficients
    - standard_errors
  tolerances:
    coefficients: 1e-6
    standard_errors: 1e-4

notes: >-
  Uses the same absorbing staggered-adoption DGP as pylpdid's quickstart
  example. The constant treatment effect is 2.0, so post-treatment coefficients
  should be close to 2.0. Only the Python reference is provided (R is left aside
  for now).
