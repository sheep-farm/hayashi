:
name: Validation

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Install Python dependencies
        run: pip install -r validation/requirements.txt

      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("wooldridge", "jsonlite"), repos="https://cloud.r-project.org/")'

      - name: Build Hayashi
        run: cargo build --release

      - name: Add Hayashi to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Run validation programme
        run: python validation/run.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            validation/MATRIX.md
            validation/matrix.yml
            validation/cases/**/hayashi/output.csv
            validation/cases/**/reference/expected.json
