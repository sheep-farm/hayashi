name: Validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Greeners dependency
        run: git clone --depth 1 --branch develop https://github.com/sheep-farm/Greeners.git ../Greeners

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Install Python dependencies
        run: pip install -r validation/requirements.txt

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: "deps::validation"
          working-directory: ${{ github.workspace }}

      - name: Check validation metadata
        run: python validation/run.py --check

      - name: Test validation runner
        run: python -m unittest validation/test_run.py

      - name: Build Hayashi
        run: cargo build --release

      - name: Add Hayashi to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Run validation programme
        run: python validation/run.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            validation/MATRIX.md
            validation/matrix.yml
            validation/cases/**/hayashi/output.csv
            validation/cases/**/reference/expected.json
