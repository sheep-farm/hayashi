name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_RELEASE_STRIP: symbols

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Greeners dependency
        run: git clone --depth 1 --branch develop https://github.com/sheep-farm/Greeners.git ../Greeners
        shell: bash

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.target }}

      - name: Build
        run: cargo build --release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf hay-nightly-${{ matrix.target }}.tar.gz -C target/release hay

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/hay.exe -DestinationPath hay-nightly-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: hay-${{ matrix.target }}
          path: hay-nightly-*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated nightly build from the `dev` branch.

            **Not a stable release.** May contain bugs and incomplete features.
            Use `hay dist-update --nightly` to install, or download manually below.

            Build date: ${{ github.run_date }}
            Commit: ${{ github.sha }}
          prerelease: true
          files: hay-nightly-*
