[package]
name = "hayashi"
version = "0.1.0"
edition = "2021"
description = "An interpreted, statically-typed language for applied econometrics"
license = "MIT"

[[bin]]
name = "hayashi"
path = "src/main.rs"

[dependencies]
greeners = "1.4.4"
ndarray = "0.17"
thiserror = "2"
rustyline = "14"
anyhow = "1"
dta = "0.6.0"
ureq = "2"
tempfile = "3"
rand = "0.8"
plotters = { version = "0.3", default-features = false, features = ["svg_backend", "line_series"] }
calamine = "0.35"
parquet = { version = "59", default-features = false, features = ["arrow", "snap"] }
arrow = { version = "59", default-features = false, features = ["csv", "json"] }
rust_xlsxwriter = "0.95"
csv = "1"
rusqlite = { version = "0.33", features = ["bundled"] }
odbc-api = { version = "28", optional = true }

[features]
default = []
odbc = ["dep:odbc-api"]
